<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chisel">
<meta name="theme-color" content="#06021f">
<title>Chisel — Fight Club Physique</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blk:#06021f;--surf:#0d0830;--surf2:#150e45;--surf3:#1e1560;
  --bdr:#2a2260;--acc:#C09A3C;--acc2:#d4b04a;--royal:#174fa3;--royal2:#1e5fc0;
  --txt:#f0ede8;--mut:#8888aa;--grn:#2a7a4a;--grn2:#3a9a5a;
  --fn:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--blk);color:var(--txt);font-family:var(--fb);font-size:14px;overflow-x:hidden}
.app-header{background:var(--surf);border-bottom:2px solid var(--acc);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--fn);font-size:32px;letter-spacing:4px;color:var(--txt)}.logo span{color:var(--acc)}
.logo-sub{font-size:9px;color:var(--acc);letter-spacing:3px;margin-top:-5px;opacity:.85}
.nav-tabs{display:flex;gap:2px}
.nav-tab{background:none;border:none;color:var(--mut);font-family:var(--fb);font-size:12px;font-weight:500;padding:7px 11px;border-radius:6px;cursor:pointer;letter-spacing:.5px}
.nav-tab.active{background:var(--royal);color:#fff}
.view{display:none;padding:20px 16px;max-width:860px;margin:0 auto;padding-bottom:40px}
.view.active{display:block}

.quote-banner{border-left:3px solid var(--acc);border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:16px;background:var(--surf2)}
.quote-text{font-size:13px;font-style:italic;line-height:1.55}
.quote-author{font-size:11px;color:var(--acc);font-weight:500;margin-top:5px;letter-spacing:.5px}
.quote-banner.cq{border-left-color:var(--grn)}.quote-banner.cq .quote-author{color:#4aaa6a}
.quote-banner.rq{border-left-color:var(--mut)}.quote-banner.rq .quote-author{color:var(--mut)}
.quote-banner.wq{border-left-color:var(--royal2)}.quote-banner.wq .quote-author{color:#6ab0ff}
.quote-banner.hq{border-left-color:#f0a030}.quote-banner.hq .quote-author{color:#f0a030}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-family:var(--fn);font-size:24px;letter-spacing:2px;color:var(--acc)}
.cal-nav{display:flex;gap:6px}
.cal-btn{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);width:34px;height:34px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-day-label{text-align:center;font-size:10px;font-weight:500;color:var(--mut);padding:3px 0;letter-spacing:.8px}
.cal-day{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;background:var(--surf);position:relative}
.cal-day.empty{background:none;border-color:transparent;cursor:default}
.cal-day.today{border-color:var(--acc)!important}
.cal-day.liftday{background:#0f0a35;border-color:#2a2260}
.cal-day.liss-day{background:#0a1a10;border-color:#1a3a20}
.cal-day.hiit-day{background:#1a0f05;border-color:#3a2010}
.cal-day.weighday{border-color:var(--acc)!important}
.cal-day.logged::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--acc)}
.day-num{font-size:13px;font-weight:500}
.day-type{font-size:8px;font-weight:500;letter-spacing:.3px;margin-top:1px;text-align:center;line-height:1.2}
.dt-lift{color:var(--royal2)}.dt-liss{color:#4aaa6a}.dt-hiit{color:#f0a030}.dt-rest{color:var(--mut)}.dt-weigh{color:var(--acc)}
.cal-legend{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mut)}
.legend-dot{width:9px;height:9px;border-radius:2px}

.wcard{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:14px}
.wcard-hdr{padding:13px 18px;display:flex;align-items:center;justify-content:space-between}
.wcard-hdr.lift{background:var(--royal)}.wcard-hdr.liss{background:#1a4a2a}.wcard-hdr.hiit{background:#5a3008}.wcard-hdr.rest{background:var(--surf2)}.wcard-hdr.weigh{background:#6a4a08}
.wc-title{font-family:var(--fn);font-size:21px;letter-spacing:2px}
.wc-sub{font-size:11px;opacity:.85;margin-top:1px}
.wc-badge{background:rgba(0,0,0,.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.prog-bar-wrap{height:3px;background:var(--surf3)}
.prog-bar{height:100%;background:var(--acc);transition:width .3s}

.cardio-block{background:var(--surf2);border:1px solid #1a3a20;border-radius:11px;margin-bottom:14px;overflow:hidden}
.cardio-block-hdr{background:#12302a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.cardio-block-title{font-family:var(--fn);font-size:16px;letter-spacing:2px;color:#4aee8a}
.cardio-block-sub{font-size:11px;color:#4aaa6a;margin-top:1px}
.cardio-block-body{padding:12px 16px}
.cardio-mini-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.cardio-save-btn{background:#1a4a2a;border:1px solid var(--grn);color:#4aaa6a;font-family:var(--fn);font-size:14px;letter-spacing:1px;padding:9px 18px;border-radius:8px;cursor:pointer;width:100%;margin-top:4px}
.cardio-logged-tag{font-size:11px;color:#4aaa6a;text-align:center;padding-top:6px}

.timer-bar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--bdr);background:var(--surf2)}
.timer-display{font-family:var(--fn);font-size:30px;letter-spacing:3px}
.timer-display.running{color:var(--acc)}
.timer-btns{display:flex;gap:8px}
.tbtn{border:1px solid var(--bdr);background:var(--surf3);color:var(--txt);padding:6px 13px;border-radius:7px;cursor:pointer;font-family:var(--fn);font-size:13px;letter-spacing:1px}
.tbtn.start{background:var(--royal);border-color:var(--royal)}

.ex-list{padding:10px 16px}
.ex-block{border:1px solid var(--bdr);border-radius:10px;margin-bottom:9px;overflow:hidden}
.ex-head{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 11px;background:var(--surf2);gap:8px}
.ex-name-txt{font-size:13px;font-weight:500;line-height:1.3}
.ex-meta-txt{font-size:11px;color:var(--mut);margin-top:2px;line-height:1.4}
.ex-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--bdr);background:none;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;flex-shrink:0;margin-top:2px}
.ex-check.done{background:var(--acc);border-color:var(--acc);color:#06021f}
.sets-table{width:100%;border-collapse:collapse}
.sets-table th{font-size:10px;color:var(--mut);font-weight:500;letter-spacing:.8px;text-align:center;padding:5px 4px;border-bottom:1px solid var(--bdr)}
.sets-table td{padding:4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.sets-table tr:last-child td{border-bottom:none}
.set-inp{background:var(--surf3);border:1px solid var(--bdr);color:var(--txt);border-radius:5px;padding:5px 4px;width:62px;text-align:center;font-family:var(--fb);font-size:13px}
.set-inp:focus{outline:none;border-color:var(--acc)}
.set-done-btn{background:none;border:1px solid var(--bdr);color:var(--mut);border-radius:5px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:500}
.set-done-btn.logged{background:rgba(192,154,60,.2);border-color:var(--acc);color:var(--acc)}
.ex-note{background:var(--surf3);border-left:2px solid var(--acc);padding:6px 10px;font-size:11px;color:var(--mut);line-height:1.5;margin:3px 8px 7px}
.day-focus{background:var(--surf3);border-left:3px solid var(--royal2);padding:8px 12px;margin:0 16px 12px;border-radius:0 6px 6px 0;font-size:11px;color:#6ab0ff;line-height:1.5}

.action-btn{display:block;width:calc(100% - 32px);margin:0 16px 14px;border:none;color:#fff;font-family:var(--fn);font-size:16px;letter-spacing:2px;padding:13px;border-radius:10px;cursor:pointer}
.action-btn.lift-save{background:var(--royal)}.action-btn.weigh-save{background:#6a4a08}

.form-section{padding:12px 16px}
.form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:9px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:500;letter-spacing:.9px;text-transform:uppercase;color:var(--mut)}
.form-inp{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);border-radius:7px;padding:9px 10px;font-family:var(--fb);font-size:14px;width:100%}
.form-inp:focus{outline:none;border-color:var(--royal2)}
.form-inp.wf:focus{border-color:var(--acc)}
.form-ta{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);border-radius:7px;padding:9px 10px;font-family:var(--fb);font-size:13px;width:100%;resize:vertical;min-height:65px}
.form-ta:focus{outline:none;border-color:var(--royal2)}

.bf-result{background:var(--surf2);border:1px solid var(--acc);border-radius:10px;padding:13px;margin-bottom:13px;display:none}
.bf-num{font-family:var(--fn);font-size:38px;letter-spacing:2px}
.bf-cat{font-size:12px;margin-top:2px;font-weight:500}
.bf-formula{font-size:10px;color:var(--mut);margin-top:3px}
.bf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}
.bf-stat{background:var(--surf3);border-radius:8px;padding:9px;text-align:center}
.bf-stat-num{font-family:var(--fn);font-size:20px;letter-spacing:1px;color:var(--acc)}
.bf-stat-lbl{font-size:10px;color:var(--mut);margin-top:2px}

.log-entry{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:11px 13px;margin-bottom:8px}
.log-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.log-name{font-size:13px;font-weight:500}
.log-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.lb-lift{background:rgba(23,79,163,.3);color:#6ab0ff}
.lb-liss{background:rgba(42,122,74,.2);color:#4aaa6a}
.lb-hiit{background:rgba(240,160,48,.2);color:#f0a030}
.lb-weigh{background:rgba(192,154,60,.2);color:var(--acc)}
.log-date{font-size:11px;color:var(--mut)}
.log-detail{font-size:12px;color:var(--mut);margin-top:3px}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:13px;text-align:center}
.stat-num{font-family:var(--fn);font-size:30px;letter-spacing:2px;color:var(--acc)}
.stat-lbl{font-size:10px;color:var(--mut);font-weight:500;letter-spacing:.5px;margin-top:3px}
.week-prog{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:13px;margin-bottom:13px}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:9px}
.wday{display:flex;flex-direction:column;align-items:center;gap:3px}
.wdot{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--mut)}
.wdot.done{background:var(--acc);border-color:var(--acc);color:#06021f;font-weight:700}
.wdot.liss-done{background:var(--grn);border-color:var(--grn);color:#fff}
.wdot.hiit-done{background:#7a4a08;border-color:#f0a030;color:#f0a030}
.wdot.tday{border-color:var(--acc);color:var(--acc)}
.wday-lbl{font-size:9px;color:var(--mut)}
.bf-history{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:13px;margin-top:11px}
.bfh-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.bfh-row:last-child{border-bottom:none}
.bfh-val{font-family:var(--fn);font-size:17px;letter-spacing:1px}

.rest-overlay{position:fixed;inset:0;background:rgba(6,2,31,.93);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.rest-overlay.show{opacity:1;pointer-events:all}
.rest-modal{background:var(--surf2);border:2px solid var(--acc);border-radius:20px;padding:26px 22px;text-align:center;width:285px;max-width:90vw}
.rest-title{font-family:var(--fn);font-size:13px;letter-spacing:2px;color:var(--mut);margin-bottom:3px}
.rest-ex{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:14px;min-height:16px;line-height:1.3}
.rest-clock{font-family:var(--fn);font-size:66px;letter-spacing:4px;line-height:1;margin-bottom:6px;transition:color .3s;color:var(--txt)}
.rest-clock.warn{color:#f0a030}.rest-clock.done-clr{color:var(--acc)}
.rest-progress{width:100%;height:4px;background:var(--surf3);border-radius:2px;margin-bottom:16px;overflow:hidden}
.rest-progress-bar{height:100%;background:var(--acc);border-radius:2px;transition:width 1s linear}
.rest-adj{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:18px}
.rest-adj-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.rest-adj-btn{background:var(--surf3);border:1px solid var(--bdr);color:var(--txt);width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rest-adj-lbl{font-size:10px;color:var(--mut)}
.rest-mid{font-size:11px;color:var(--mut)}
.rest-btns{display:flex;gap:10px;justify-content:center}
.rest-btn{border:none;font-family:var(--fn);font-size:14px;letter-spacing:1px;padding:9px 20px;border-radius:9px;cursor:pointer}
.rest-btn.skip{background:var(--surf3);color:var(--mut);border:1px solid var(--bdr)}
.rest-btn.done-btn{background:var(--acc);color:#06021f}

.toast{background:var(--surf2);border:1px solid var(--acc);color:var(--txt);padding:10px 16px;border-radius:9px;font-size:13px;position:fixed;bottom:24px;right:14px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:1000;max-width:calc(100vw - 28px)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:#4aaa6a}
.empty-state{text-align:center;padding:40px 16px;color:var(--mut);font-size:13px}
</style>
</head>
<body>

<div class="app-header">
  <div><div class="logo">CH<span>I</span>SEL</div><div class="logo-sub">Fight Club Physique</div></div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-calendar" onclick="showView('calendar')">Calendar</button>
    <button class="nav-tab" id="tab-today" onclick="showView('today')">Today</button>
    <button class="nav-tab" id="tab-log" onclick="showView('log')">Log</button>
    <button class="nav-tab" id="tab-progress" onclick="showView('progress')">Progress</button>
  </div>
</div>

<div class="rest-overlay" id="restOverlay">
  <div class="rest-modal">
    <div class="rest-title">REST PERIOD</div>
    <div class="rest-ex" id="restExName"></div>
    <div class="rest-clock" id="restClock">1:00</div>
    <div class="rest-progress"><div class="rest-progress-bar" id="restBar" style="width:100%"></div></div>
    <div class="rest-adj">
      <div class="rest-adj-wrap"><button class="rest-adj-btn" onclick="adjustRest(-30)">−</button><div class="rest-adj-lbl">−30s</div></div>
      <div class="rest-mid">adjust</div>
      <div class="rest-adj-wrap"><button class="rest-adj-btn" onclick="adjustRest(30)">+</button><div class="rest-adj-lbl">+30s</div></div>
    </div>
    <div class="rest-btns">
      <button class="rest-btn skip" onclick="closeRest()">Skip</button>
      <button class="rest-btn done-btn" onclick="closeRest()">Done</button>
    </div>
  </div>
</div>

<div class="view active" id="view-calendar">
  <div class="cal-header">
    <div class="cal-month" id="calMonth"></div>
    <div class="cal-nav">
      <button class="cal-btn" onclick="changeMonth(-1)">&#8249;</button>
      <button class="cal-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#0f0a35;border:1px solid #2a5faa"></div>Lift + Cardio</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0a1a10;border:1px solid #4aaa6a"></div>LISS Only</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a0f05;border:1px solid #f0a030"></div>HIIT Only</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--acc);border-radius:50%"></div>Logged</div>
  </div>
</div>

<div class="view" id="view-today"><div id="todayContent"></div></div>
<div class="view" id="view-log"><div id="logList"></div></div>
<div class="view" id="view-progress"><div id="progressContent"></div></div>
<div class="toast" id="toast"></div>

<script>
const QUOTES={
  lift:[
    {text:"The last three or four reps is what makes the muscle grow. This area of pain divides a champion from someone who is not a champion.",author:"Arnold Schwarzenegger"},
    {text:"If something stands between you and your success, move it. Never be denied.",author:"Dwayne Johnson"},
    {text:"We must all suffer one of two things: the pain of discipline or the pain of regret.",author:"Jim Rohn"},
    {text:"The Iron never lies to you. It will always kick you the real deal.",author:"Henry Rollins"},
    {text:"Champions aren't made in gyms. Champions are made from something deep inside them.",author:"Muhammad Ali"},
    {text:"Pain is temporary. If I quit, it lasts forever.",author:"Lance Armstrong"},
    {text:"Today I will do what others won't, so tomorrow I can accomplish what others can't.",author:"Jerry Rice"},
    {text:"Hard work beats talent when talent doesn't work hard.",author:"Tim Notke"},
    {text:"Your body can stand almost anything. It's your mind that you have to convince.",author:"Unknown"},
    {text:"The successful warrior is the average man, with laser-like focus.",author:"Bruce Lee"},
    {text:"The fight is won or lost far away from witnesses — behind the lines, in the gym.",author:"Muhammad Ali"},
    {text:"Make sure your worst enemy doesn't live between your own two ears.",author:"Laird Hamilton"},
    {text:"Wake up determined. Go to bed satisfied.",author:"Dwayne Johnson"},
    {text:"Earn it every single day.",author:"Unknown"},
    {text:"Every rep. Every set. Every day.",author:"Unknown"},
    {text:"Discipline is doing what needs to be done even when you don't want to do it.",author:"Unknown"},
    {text:"It always seems impossible until it's done.",author:"Nelson Mandela"},
    {text:"Be stronger than your excuses.",author:"Unknown"},
    {text:"Success is not given. It is earned in the gym, on the road, with blood and sweat.",author:"Unknown"},
    {text:"Do not pray for an easy life, pray for the strength to endure a difficult one.",author:"Bruce Lee"}
  ],
  liss:[
    {text:"Run when you can, walk if you have to, crawl if you must; just never give up.",author:"Dean Karnazes"},
    {text:"Motivation is what gets you started. Habit is what keeps you going.",author:"Jim Ryun"},
    {text:"It never gets easier. You just get stronger.",author:"Unknown"},
    {text:"Take care of your body. It's the only place you have to live.",author:"Jim Rohn"},
    {text:"Zone 2 today. Shredded tomorrow.",author:"Unknown"},
    {text:"The only bad workout is the one that didn't happen.",author:"Unknown"},
    {text:"Once you see results, it becomes an addiction.",author:"Unknown"},
    {text:"Discipline is the bridge between goals and accomplishment.",author:"Jim Rohn"},
    {text:"Low and slow — this is where the fat goes.",author:"Unknown"},
    {text:"The body achieves what the mind believes.",author:"Unknown"},
    {text:"Slow is smooth. Smooth is steady. Steady is shredded.",author:"Unknown"},
    {text:"Every mile is a gift.",author:"Unknown"}
  ],
  hiit:[
    {text:"Pain is weakness leaving the body.",author:"Unknown"},
    {text:"Go hard or go home.",author:"Unknown"},
    {text:"Sweat is just fat crying.",author:"Unknown"},
    {text:"You don't find will power. You create it.",author:"Unknown"},
    {text:"Intensity separates the good from the great.",author:"Unknown"},
    {text:"30 seconds of hard. A lifetime of results.",author:"Unknown"},
    {text:"The fight is won far away from witnesses.",author:"Muhammad Ali"},
    {text:"Short bursts. Big results.",author:"Unknown"}
  ],
  rest:[
    {text:"Rest when you're weary. Refresh and renew yourself, your body, your mind, your spirit.",author:"Ralph Marston"},
    {text:"Recovery is just as important as the workout itself.",author:"Unknown"},
    {text:"Muscles are torn in the gym, fed in the kitchen, and built in bed.",author:"Unknown"},
    {text:"Almost everything will work again if you unplug it for a few minutes, including you.",author:"Anne Lamott"},
    {text:"Champions are built in recovery.",author:"Unknown"},
    {text:"Sleep is the golden chain that ties health and our bodies together.",author:"Thomas Dekker"},
    {text:"In rest lies the strength to seize tomorrow.",author:"Unknown"},
    {text:"Take rest; a field that has rested gives a bountiful crop.",author:"Ovid"}

const DAILY_CARDIO_NOTE="Brad Pitt ran 3 miles every training day. Walk/jog 3 miles before or after lifting. Incline treadmill at 3.5-4 mph counts. This is the #1 fat loss driver.";

const DOW=['sun','mon','tue','wed','thu','fri','sat'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_LBL=['Su','Mo','Tu','We','Th','Fr','Sa'];
const DOW_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let viewMonth=new Date();viewMonth.setDate(1);
let logs={},setData={},exHistory={};
let timerState={running:false,start:0,elapsed:0,interval:null};
let activeKey=null;
let restTimer={active:false,total:60,remaining:60,interval:null};

function gk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function todayDate(){return new Date()}
function load(){
  try{
    logs=JSON.parse(localStorage.getItem('chisel3_logs')||'{}');
    setData=JSON.parse(localStorage.getItem('chisel3_sets')||'{}');
    exHistory=JSON.parse(localStorage.getItem('chisel3_exhist')||'{}');
  }catch(e){logs={};setData={};exHistory={}}
}
function save(){
  try{
    localStorage.setItem('chisel3_logs',JSON.stringify(logs));
    localStorage.setItem('chisel3_sets',JSON.stringify(setData));
    localStorage.setItem('chisel3_exhist',JSON.stringify(exHistory));
  }catch(e){}
}
function getExHistory(n,s){return exHistory[n]?.[s]||{}}
function saveExHistory(n,s,f,v){
  if(!exHistory[n])exHistory[n]={};
  if(!exHistory[n][s])exHistory[n][s]={};
  exHistory[n][s][f]=v;save();
}

function startRest(exName){
  restTimer.total=60;restTimer.remaining=60;restTimer.active=true;
  document.getElementById('restExName').textContent=exName;
  updateRestDisplay();
  document.getElementById('restOverlay').classList.add('show');
  clearInterval(restTimer.interval);
  restTimer.interval=setInterval(()=>{
    if(restTimer.remaining>0){restTimer.remaining--;updateRestDisplay();}
    else{clearInterval(restTimer.interval);document.getElementById('restClock').classList.add('done-clr');if(navigator.vibrate)navigator.vibrate([200,100,200]);}
  },1000);
}
function updateRestDisplay(){
  const m=Math.floor(restTimer.remaining/60),s=restTimer.remaining%60;
  const cl=document.getElementById('restClock'),bar=document.getElementById('restBar');
  if(cl){cl.textContent=m+':'+(s<10?'0':'')+s;cl.className='rest-clock'+(restTimer.remaining<=10?' warn':restTimer.remaining<=0?' done-clr':'');}
  if(bar)bar.style.width=Math.max(0,(restTimer.remaining/restTimer.total)*100)+'%';
}
function adjustRest(d){
  restTimer.remaining=Math.max(10,restTimer.remaining+d);
  if(d>0)restTimer.total=Math.max(restTimer.total,restTimer.remaining);
  updateRestDisplay();
}
function closeRest(){
  clearInterval(restTimer.interval);restTimer.active=false;
  document.getElementById('restOverlay').classList.remove('show');
  document.getElementById('restClock').className='rest-clock';
}

function pickQuote(pool,key){const seed=parseInt((key||gk(todayDate())).replace(/-/g,''))%pool.length;return pool[seed];}
function quoteHTML(type,key){
  const map={lift:{pool:QUOTES.lift,cls:''},liss:{pool:QUOTES.liss,cls:'cq'},hiit:{pool:QUOTES.hiit,cls:'hq'},rest:{pool:QUOTES.rest,cls:'rq'},weigh:{pool:QUOTES.weigh,cls:'wq'}};
  const m=map[type]||map.lift;const q=pickQuote(m.pool,key);
  return`<div class="quote-banner ${m.cls}"><div class="quote-text">"${q.text}"</div><div class="quote-author">— ${q.author}</div></div>`;
}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));

  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='today'){activeKey=gk(todayDate());renderToday(todayDate());}
  if(name==='log')renderLog();
  if(name==='progress')renderProgress();
  if(name==='calendar')renderCalendar();
}
function changeMonth(d){viewMonth.setMonth(viewMonth.getMonth()+d);renderCalendar()}

function getDayMeta(dow){
  const w=WORKOUTS[dow];
  if(!w)return{cls:'',tl:'REST',tc:'dt-rest'};
  if(w.type==='liss')return{cls:' liss-day',tl:'LISS',tc:'dt-liss'};
  if(w.type==='hiit')return{cls:' hiit-day',tl:'HIIT',tc:'dt-hiit'};
  if(w.type==='lift_weigh')return{cls:' liftday weighday',tl:'D1+WI',tc:'dt-weigh'};
  return{cls:' liftday',tl:'LIFT',tc:'dt-lift'};
}

function renderCalendar(){
  document.getElementById('calMonth').textContent=MONTHS[viewMonth.getMonth()]+' '+viewMonth.getFullYear();
  const first=new Date(viewMonth.getFullYear(),viewMonth.getMonth(),1).getDay();
  const days=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,0).getDate();
  const tk=gk(todayDate());
  let h=DOW_LBL.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  for(let i=0;i<first;i++)h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const dt=new Date(viewMonth.getFullYear(),viewMonth.getMonth(),d);
    const k=gk(dt);const m=getDayMeta(DOW[dt.getDay()]);
    let cls='cal-day'+m.cls;
    if(k===tk)cls+=' today';
    if(logs[k])cls+=' logged';
    h+=`<div class="${cls}" onclick="selectDay('${k}')"><div class="day-num">${d}</div><div class="day-type ${m.tc}">${m.tl}</div></div>`;
  }
  document.getElementById('calGrid').innerHTML=h;
}

function selectDay(k){
  activeKey=k;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-today').classList.add('active');
  document.getElementById('tab-today').classList.add('active');
  const[y,m,d]=k.split('-').map(Number);renderToday(new Date(y,m-1,d));
}

function safeEx(n){return n.replace(/'/g,"\\'").replace(/"/g,'\\"')}

      bfSaved=`<div class="bf-result" style="display:block"><div style="display:flex;align-items:baseline;gap:10px"><div class="bf-num" style="color:${bc}">${wlog.bf.toFixed(1)}%</div><div><div class="bf-cat" style="color:${bc}">${wlog.bfCat}</div><div class="bf-formula">Air Force Body Fat Method</div></div></div><div class="bf-grid"><div class="bf-stat"><div class="bf-stat-num">${wlog.weight}</div><div class="bf-stat-lbl">lbs</div></div><div class="bf-stat"><div class="bf-stat-num">${wlog.fatMass}</div><div class="bf-stat-lbl">Fat lbs</div></div><div class="bf-stat"><div class="bf-stat-num">${wlog.leanMass}</div><div class="bf-stat-lbl">Lean lbs</div></div></div></div>`;
    }
    weighSection=`<div class="wcard" style="margin-top:12px">
      <div class="wcard-hdr weigh"><div><div class="wc-title">Weekly Weigh-In</div><div class="wc-sub">Air Force body fat method</div></div><div class="wc-badge">WEIGH-IN</div></div>
      <div class="form-section">
        ${quoteHTML('weigh',k)}
        ${bfSaved}
        <div class="form-row">
          <div class="form-group"><label class="form-label">Weight (lbs)</label><input class="form-inp wf" type="number" step="0.1" id="wi_weight" placeholder="230" value="${wlog.weight||''}" oninput="calcBF('${k}')"></div>
          <div class="form-group"><label class="form-label">Neck (in)</label><input class="form-inp wf" type="number" step="0.25" id="wi_neck" placeholder="16.0" value="${wlog.neck||''}" oninput="calcBF('${k}')"></div>
          <div class="form-group"><label class="form-label">Waist (in)</label><input class="form-inp wf" type="number" step="0.25" id="wi_waist" placeholder="40.0" value="${wlog.waist||''}" oninput="calcBF('${k}')"></div>
        </div>
        <div class="form-row-2">
          <div class="form-group"><label class="form-label">Abdomen (in)</label><input class="form-inp wf" type="number" step="0.25" id="wi_abd" placeholder="42.0" value="${wlog.abdomen||''}" oninput="calcBF('${k}')"></div>
          <div class="form-group"><label class="form-label">Height (in)</label><input class="form-inp wf" type="number" step="0.25" id="wi_ht" placeholder="70" value="${wlog.height||'70'}" oninput="calcBF('${k}')"></div>
        </div>
        <div id="bf_result_${k}" class="bf-result"></div>
        <button class="action-btn weigh-save" onclick="saveWeighIn('${k}')">Save Weigh-In</button>
        ${logs[k]?.weigh?'<div style="text-align:center;font-size:11px;color:var(--acc);padding-bottom:10px">&#10003; Weigh-in logged</div>':''}
      </div>
    </div>`;
  }

  c.innerHTML=dayLabel+quoteHTML('lift',k)+`<div class="wcard">
    <div class="wcard-hdr lift"><div><div class="wc-title">${w.name}</div><div class="wc-sub">${w.sub}</div></div><div class="wc-badge">${doneCount}/${totalEx}</div></div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    ${w.focus?`<div class="day-focus">${w.focus}</div>`:''}
    <div class="timer-bar">
      <div class="timer-display ${timerState.running?'running':''}" id="timerDisplay">${formatTimer(timerEl)}</div>
      <div class="timer-btns">
        <button class="tbtn start" id="timerStartBtn" onclick="toggleTimer()">${timerState.running?'PAUSE':'START'}</button>
        <button class="tbtn" onclick="resetTimer()">RESET</button>
      </div>
    </div>
    <div class="ex-list">${exHtml}</div>
    <div style="padding:0 16px 8px">
      <div class="form-group" style="margin-bottom:11px">
        <label class="form-label">Session Notes</label>
        <textarea class="form-ta" id="lift_notes" placeholder="PRs, pump quality, energy, technique...">${sv?.notes||''}</textarea>
      </div>
    </div>
    <button class="action-btn lift-save" onclick="saveLift('${k}','${w.name}')">Log Workout</button>
  </div>
  ${cardioBlock}
  ${weighSection}`;

  if(timerState.running)startTimerInterval();
}

function formatTimer(ms){const t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return(h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function toggleTimer(){
  if(timerState.running){
    clearInterval(timerState.interval);timerState.elapsed+=Date.now()-timerState.start;timerState.running=false;
    const btn=document.getElementById('timerStartBtn');if(btn){btn.textContent='RESUME';btn.style.background='var(--surf3)';btn.style.borderColor='var(--bdr)';}
    const d=document.getElementById('timerDisplay');if(d)d.classList.remove('running');
  }else{
    timerState.start=Date.now();timerState.running=true;startTimerInterval();
    const btn=document.getElementById('timerStartBtn');if(btn){btn.textContent='PAUSE';btn.style.background='var(--royal)';btn.style.borderColor='var(--royal)';}
    const d=document.getElementById('timerDisplay');if(d)d.classList.add('running');
  }
}
function startTimerInterval(){
  clearInterval(timerState.interval);
  timerState.interval=setInterval(()=>{const el=timerState.elapsed+(Date.now()-timerState.start);const d=document.getElementById('timerDisplay');if(d)d.textContent=formatTimer(el);},500);
}
function resetTimer(){
  clearInterval(timerState.interval);timerState={running:false,start:0,elapsed:0,interval:null};
  const d=document.getElementById('timerDisplay');if(d){d.textContent='00:00';d.classList.remove('running');}
  const btn=document.getElementById('timerStartBtn');if(btn){btn.textContent='START';btn.style.background='var(--royal)';btn.style.borderColor='var(--royal)';}
}
function saveSet(k,ei,si,field,val,exName){
  if(!setData[k])setData[k]={};const sk=`${ei}_${si}`;if(!setData[k][sk])setData[k][sk]={};
  setData[k][sk][field]=val;if(val&&val!=='')saveExHistory(exName,si,field,val);else save();
}
function toggleSet(k,ei,si,exName){
  if(!setData[k])setData[k]={};const sk=`${ei}_${si}`;if(!setData[k][sk])setData[k][sk]={};
  const wasDone=setData[k][sk].done||false;setData[k][sk].done=!wasDone;save();
  if(!wasDone)startRest(exName);
  const[y,m,d]=k.split('-').map(Number);renderToday(new Date(y,m-1,d));
}
function saveDailyCardio(k){
  if(!logs[k])logs[k]={};
  logs[k].cardioLog={done:true,distance:document.getElementById('dc_dist')?.value||'',duration:document.getElementById('dc_dur')?.value||'',incline:document.getElementById('dc_incline')?.value||''};
  save();showToast('Daily cardio logged!',true);
  const[y,m,d]=k.split('-').map(Number);renderToday(new Date(y,m-1,d));
}
function saveCardio(k,type){
  logs[k]={type,cardio:{
    distance:document.getElementById('c_dist')?.value||'',
    speed:document.getElementById('c_speed')?.value||'',
    incline:document.getElementById('c_incline')?.value||'',
    duration:document.getElementById('c_dur')?.value||'',
    hr:document.getElementById('c_hr')?.value||'',
    rounds:document.getElementById('c_rounds')?.value||'',
    notes:document.getElementById('c_notes')?.value||''
  },date:k};
  save();renderCalendar();showToast(type==='hiit'?'HIIT logged!':'LISS logged!',true);
}
function calcBF(k){
  const wt=parseFloat(document.getElementById('wi_weight')?.value)||0;
  const neck=parseFloat(document.getElementById('wi_neck')?.value)||0;
  const waist=parseFloat(document.getElementById('wi_waist')?.value)||0;
  const abd=parseFloat(document.getElementById('wi_abd')?.value)||0;
  const ht=parseFloat(document.getElementById('wi_ht')?.value)||70;
  const res=document.getElementById('bf_result_'+k);if(!res)return;
  if(!wt||!neck||!waist||!abd||!ht||abd+waist<=neck){res.style.display='none';return;}
  const bf=Math.max(0,Math.min(60,86.010*Math.log10(abd+waist-neck)-70.041*Math.log10(ht)+36.76));
  let cat='',catColor='';
  if(bf<6){cat='Essential Fat';catColor='#e84a4a';}else if(bf<14){cat='Athletic';catColor='#4aaa6a';}
  else if(bf<18){cat='Fitness';catColor='#4aaa6a';}else if(bf<25){cat='Average';catColor='#f0a030';}
  else{cat='Above Average';catColor='#e84a4a';}
  const fatLbs=(wt*bf/100).toFixed(1),leanLbs=(wt*(1-bf/100)).toFixed(1);
  res.style.display='block';
  res.innerHTML=`<div style="display:flex;align-items:baseline;gap:10px"><div class="bf-num" style="color:${catColor}">${bf.toFixed(1)}%</div><div><div class="bf-cat" style="color:${catColor}">${cat}</div><div class="bf-formula">Air Force Body Fat Method</div></div></div><div class="bf-grid"><div class="bf-stat"><div class="bf-stat-num">${wt}</div><div class="bf-stat-lbl">lbs</div></div><div class="bf-stat"><div class="bf-stat-num">${fatLbs}</div><div class="bf-stat-lbl">Fat lbs</div></div><div class="bf-stat"><div class="bf-stat-num">${leanLbs}</div><div class="bf-stat-lbl">Lean lbs</div></div></div>`;
  res._bf=bf;res._fat=fatLbs;res._lean=leanLbs;res._cat=cat;
}
function saveWeighIn(k){
  const wt=parseFloat(document.getElementById('wi_weight')?.value)||0;
  const neck=parseFloat(document.getElementById('wi_neck')?.value)||0;
  const waist=parseFloat(document.getElementById('wi_waist')?.value)||0;
  const abd=parseFloat(document.getElementById('wi_abd')?.value)||0;
  const ht=parseFloat(document.getElementById('wi_ht')?.value)||70;
  const res=document.getElementById('bf_result_'+k);
  if(!logs[k])logs[k]={};
  logs[k].weigh={weight:wt,neck,waist,abdomen:abd,height:ht,bf:res?._bf||null,bfCat:res?._cat,fatMass:res?._fat,leanMass:res?._lean,date:k};
  save();renderCalendar();showToast('Weigh-in saved!',true);
}
function saveLift(k,name){
  const dow=DOW[new Date(...k.split('-').map((v,i)=>i===1?+v-1:+v)).getDay()];
  const w=WORKOUTS[dow];const notes=document.getElementById('lift_notes')?.value||'';
  const sd=setData[k]||{};let done=0;
  w.exercises.forEach((ex,i)=>{if(ex.sets>0&&Array.from({length:ex.sets},(_,s)=>sd[`${i}_${s}`]?.done).every(Boolean))done++;});
  const dur=timerState.elapsed+(timerState.running?Date.now()-timerState.start:0);
  if(!logs[k])logs[k]={};
  logs[k].lift={name,notes,exercisesDone:done,total:w.exercises.length,duration:Math.round(dur/1000)};
  logs[k].type='lift';logs[k].date=k;
  save();renderCalendar();showToast('Workout logged!',true);
}
function renderLog(){
  const all=[];
  Object.entries(logs).forEach(([k,v])=>{
    const[y,m,d]=k.split('-').map(Number);
    const ds=new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    if(v.lift)all.push({date:k,ds,type:'lift',...v.lift});
    if(v.cardio&&v.type)all.push({date:k,ds,type:v.type,...v.cardio});
    if(v.weigh)all.push({date:k,ds,type:'weigh',...v.weigh});
    if(v.cardioLog?.done)all.push({date:k,ds,type:'dailycardio',...v.cardioLog});
  });
  all.sort((a,b)=>b.date.localeCompare(a.date));
  if(!all.length){document.getElementById('logList').innerHTML='<div class="empty-state">No sessions logged yet.<br>Start today.</div>';return;}
  document.getElementById('logList').innerHTML=all.map(e=>{
    if(e.type==='lift')return`<div class="log-entry"><div class="log-hdr"><span class="log-name">${e.name||'Lift'}</span><span class="log-badge lb-lift">LIFT</span></div><div class="log-date">${e.ds}</div><div class="log-detail">${e.exercisesDone||0}/${e.total||0} exercises${e.duration?` · ${Math.floor(e.duration/60)}m ${e.duration%60}s`:''}${e.notes?` · "${e.notes}"`:''}</div></div>`;
    if(e.type==='liss'){const c=logs[e.date]?.cardio||{};return`<div class="log-entry"><div class="log-hdr"><span class="log-name">LISS Cardio</span><span class="log-badge lb-liss">LISS</span></div><div class="log-date">${e.ds}</div><div class="log-detail">${c.distance?c.distance+' mi':''}${c.speed?' · '+c.speed+' mph':''}${c.incline?' · '+c.incline+'%':''}${c.duration?' · '+c.duration+' min':''}</div></div>`;}
    if(e.type==='hiit'){const c=logs[e.date]?.cardio||{};return`<div class="log-entry"><div class="log-hdr"><span class="log-name">HIIT</span><span class="log-badge lb-hiit">HIIT</span></div><div class="log-date">${e.ds}</div><div class="log-detail">${c.rounds?c.rounds+' rounds':''}${c.duration?' · '+c.duration+' min':''}${c.hr?' · Peak HR '+c.hr:''}</div></div>`;}
    if(e.type==='dailycardio')return`<div class="log-entry"><div class="log-hdr"><span class="log-name">Daily Cardio</span><span class="log-badge lb-liss">3 MI</span></div><div class="log-date">${e.ds}</div><div class="log-detail">${e.distance?e.distance+' mi':'3 miles'}${e.duration?' · '+e.duration+' min':''}${e.incline?' · '+e.incline+'% incline':''}</div></div>`;
    if(e.type==='weigh')return`<div class="log-entry"><div class="log-hdr"><span class="log-name">Weigh-In</span><span class="log-badge lb-weigh">WEIGH-IN</span></div><div class="log-date">${e.ds}</div><div class="log-detail">${e.weight||'--'} lbs${e.bf?' · '+e.bf.toFixed(1)+'% body fat · '+e.bfCat:''}</div></div>`;
    return'';
  }).join('');
}
function renderProgress(){
  const lifts=Object.values(logs).filter(v=>v.lift).length;
  const lissC=Object.values(logs).filter(v=>v.type==='liss').length;
  const hiitC=Object.values(logs).filter(v=>v.type==='hiit').length;
  const dailyC=Object.values(logs).filter(v=>v.cardioLog?.done).length;
  const weighIns=Object.values(logs).filter(v=>v.weigh).length;
  let streak=0,d=new Date(todayDate());
  while(logs[gk(d)]){streak++;d.setDate(d.getDate()-1);}
  const weekStart=new Date(todayDate());weekStart.setDate(todayDate().getDate()-todayDate().getDay());
  let wdHtml='';
  for(let i=0;i<7;i++){
    const wd=new Date(weekStart);wd.setDate(weekStart.getDate()+i);
    const wk=gk(wd);const l=logs[wk];const isT=wk===gk(todayDate());
    let dc='wdot';
    if(l?.lift)dc+=' done';else if(l?.type==='liss')dc+=' liss-done';else if(l?.type==='hiit')dc+=' hiit-done';else if(isT)dc+=' tday';
    wdHtml+=`<div class="wday"><div class="${dc}">${l?'&#10003;':DOW_SHORT[i].charAt(0)}</div><div class="wday-lbl">${DOW_SHORT[i]}</div></div>`;
  }
  const bfE=Object.entries(logs).filter(([,v])=>v.weigh?.bf).sort((a,b)=>a[0].localeCompare(b[0]));
  const lastBF=bfE.length?bfE[bfE.length-1][1].weigh.bf:null;
  const firstBF=bfE.length>1?bfE[0][1].weigh.bf:null;
  let bfH='';
  if(bfE.length){
    bfH=`<div class="bf-history"><div style="font-size:11px;color:var(--mut);letter-spacing:.8px;margin-bottom:4px">BODY FAT HISTORY</div>${[...bfE].reverse().map(([k,v])=>{
      const[y,m,d]=k.split('-').map(Number);const ds=new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const bf=v.weigh.bf;const col=bf<18?'#4aaa6a':bf<25?'#f0a030':'#e84a4a';
      return`<div class="bfh-row"><div><div style="font-size:13px;font-weight:500">${ds}</div><div style="font-size:11px;color:var(--mut);margin-top:1px">${v.weigh.weight||''}lbs · ${v.weigh.bfCat||''}</div></div><div class="bfh-val" style="color:${col}">${bf.toFixed(1)}%</div></div>`;
    }).join('')}</div>`;
  }
  document.getElementById('progressContent').innerHTML=`
    <div style="font-family:var(--fn);font-size:11px;letter-spacing:2px;color:var(--acc);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--bdr)">CHISEL — FIGHT CLUB PHYSIQUE</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${lifts}</div><div class="stat-lbl">Lift Sessions</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#4aaa6a">${lissC+dailyC}</div><div class="stat-lbl">Cardio Sessions</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#f0a030">${hiitC}</div><div class="stat-lbl">HIIT Sessions</div></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-lbl">Day Streak</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--acc)">${weighIns}</div><div class="stat-lbl">Weigh-Ins</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${lastBF?lastBF<18?'#4aaa6a':lastBF<25?'#f0a030':'#e84a4a':'var(--mut)'}">${lastBF?lastBF.toFixed(1)+'%':'--'}</div><div class="stat-lbl">Current BF%</div></div>
    </div>
    <div class="week-prog"><div style="font-size:11px;color:var(--mut);letter-spacing:.8px">THIS WEEK</div><div class="week-days">${wdHtml}</div></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" style="color:#4aaa6a">${firstBF&&lastBF?(firstBF-lastBF).toFixed(1)+'%':'--'}</div><div class="stat-lbl">Total BF Lost</div></div>
      <div class="stat-card"><div class="stat-num">${lifts+lissC+hiitC+dailyC}</div><div class="stat-lbl">Total Sessions</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--royal2)">${dailyC}</div><div class="stat-lbl">Daily Cardios</div></div>
    </div>
    ${bfH}`;
}
function showToast(msg,ok){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show'+(ok?' ok':'');
  setTimeout(()=>t.className='toast',2500);
}
load();
renderCalendar();
activeKey=gk(todayDate());
renderToday(todayDate());
document.getElementById('tab-today').classList.add('active');
document.getElementById('tab-calendar').classList.remove('active');
</script>
</body>
</html>
